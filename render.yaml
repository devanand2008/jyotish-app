services:
  - type: web
    name: jyotish-astro-app
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        value: 1055510399803-bv8vphrhlam8cn5uljii5cs8ghubcuvl.apps.googleusercontent.com
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    disk:
      name: astro-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
