services:
  - type: web
    name: jyotish-astro-app
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        value: 1055510399803-bv8vphrhlam8cn5uljii5cs8ghubcuvl.apps.googleusercontent.com
      - key: ADMIN_EMAIL
        value: devanand2008@gmail.com
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    disk:
      name: astro-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  - type: web
    name: jyotish-video-signaling
    runtime: node
    buildCommand: cd backend-video && npm ci
    startCommand: cd backend-video && npm start
    plan: starter
    healthCheckPath: /health
